name: Sales CI/CD

on:
  workflow_dispatch:

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sales-service
  CORE_REPO: "CloudExam2/Core"
  SALES_LOG_GROUP: /exam2/sales

jobs:
  terraform:
    runs-on: ubuntu-latest
    outputs:
      ec2_sales_id: ${{ steps.set-outputs.outputs.EC2_SALES_ID }}
      sales_public_ip: ${{ steps.set-outputs.outputs.SALES_IP }}
      catalog_service_url: ${{ steps.set-outputs.outputs.CATALOG_URL }}
    
    defaults:
      run:
        working-directory: ./terraform

    env:
      TF_VAR_github_owner: ${{ github.repository_owner }}
      TF_VAR_github_repo: ${{ github.event.repository.name }}
      TF_VAR_github_token: ${{ secrets.GH_PAT }}
      TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Infrastructure Data
        id: set-outputs
        run: |
          echo "EC2_SALES_ID=$(terraform output -raw ec2_sales_id)" >> $GITHUB_OUTPUT
          IP=$(terraform output -raw sales_public_ip)
          echo "SALES_IP=${IP}" >> $GITHUB_OUTPUT
          CATALOG_URL=$(terraform output -raw catalog_service_url 2>/dev/null || echo "")
          echo "CATALOG_URL=${CATALOG_URL}" >> $GITHUB_OUTPUT
          {
            echo "## Sales — Elastic IP (stable URL)"
            echo ""
            echo "| | URL |"
            echo "|--|-----|"
            echo "| Health | http://${IP}/ |"
            echo "| Swagger | http://${IP}/docs |"
            echo "| Sales API | http://${IP}/sales/ |"
            echo ""
            echo "Also updates Core repo variable \`SALES_BACKEND_URL\` → \`http://${IP}:80\`"
            if [ -n "$CATALOG_URL" ]; then
              echo ""
              echo "Talks to Catalog at: \`${CATALOG_URL}\`"
            else
              echo ""
              echo "::warning::Catalog URL not found — run Catalog CI first, then re-run Sales."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  test-backend:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ephemeral tests (no live EC2, no seed data)
        env:
          CI: "true"
        run: python -m pytest tests/ -m ephemeral -v --tb=short

      - name: Note on failures
        if: failure()
        run: |
          echo "::warning::Sales ephemeral tests failed — deploy will continue. Fix tests before relying on the API."

  deploy:
    needs: [terraform]
    runs-on: ubuntu-latest
    env:
      INSTANCE_ID: ${{ needs.terraform.outputs.ec2_sales_id }}
      CATALOG_URL: ${{ needs.terraform.outputs.catalog_service_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        run: |
          docker build --no-cache -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Check instance is SSM-managed
        run: |
          echo "Instance: ${{ env.INSTANCE_ID }}"
          aws ec2 describe-instances --instance-ids "${{ env.INSTANCE_ID }}" \
            --query "Reservations[0].Instances[0].{State:State.Name,PublicIp:PublicIpAddress,Subnet:SubnetId}" \
            --output table
          aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ env.INSTANCE_ID }}" \
            --query "InstanceInformationList[0].{PingStatus:PingStatus,AgentVersion:AgentVersion}" \
            --output table || echo "WARNING: instance not registered with SSM yet (wait a few minutes after first boot)"

      - name: Update EC2 via SSM
        id: ssm_update
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "${{ env.INSTANCE_ID }}" \
            --parameters 'commands=[
              "set -e",
              "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}",
              "for i in 1 2 3 4 5; do docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest && break; echo pull attempt $i failed, retrying...; sleep 15; done",
              "docker rm -f sales-app 2>/dev/null || true",
              "docker run -d --name sales-app -p 80:8000 --log-driver awslogs --log-opt awslogs-region=${{ env.AWS_REGION }} --log-opt awslogs-group=${{ env.SALES_LOG_GROUP }} --log-opt awslogs-stream=sales-app -e CATALOG_SERVICE_URL=${{ env.CATALOG_URL }} ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest",
              "sleep 10",
              "docker ps -a",
              "curl -fsS --max-time 10 http://127.0.0.1/ || (docker logs sales-app 2>&1; exit 1)"
            ]' \
            --region ${{ env.AWS_REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Waiting for SSM command $COMMAND_ID..."
          if ! aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ env.INSTANCE_ID }}" \
            --region ${{ env.AWS_REGION }}; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch SSM Logs on Failure
        if: steps.ssm_update.outputs.failed == 'true'
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm_update.outputs.command_id }}" \
            --instance-id "${{ env.INSTANCE_ID }}" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json
          exit 1

      - name: Verify Sales public endpoint (from GitHub to EC2 public IP)
        run: |
          IP="${{ needs.terraform.outputs.sales_public_ip }}"
          echo "=========================================="
          echo "Sales URL: http://${IP}/"
          echo "Swagger:                     http://${IP}/docs"
          echo "=========================================="
          curl -v -fsS --max-time 15 "http://${IP}/" || {
            echo "FAILED: GitHub runner could not reach http://${IP}/ — check EC2 SG, public IP, and Core VPC IGW route."
            exit 1
          }
          {
            echo "## Sales is reachable on the public IP"
            echo ""
            echo "Open on your computer: **http://${IP}/** and **http://${IP}/docs**"
            echo ""
            echo "Logs → CloudWatch **\`${{ env.SALES_LOG_GROUP }}\`** (stream \`sales-app\`). Filter inter-service: \`sales.catalog\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify CloudWatch log stream
        run: |
          sleep 20
          STREAMS=$(aws logs describe-log-streams \
            --log-group-name "${{ env.SALES_LOG_GROUP }}" \
            --order-by LastEventTime \
            --descending \
            --limit 3 \
            --query "logStreams[*].logStreamName" \
            --output text 2>/dev/null || true)
          echo "Log streams in ${{ env.SALES_LOG_GROUP }}: ${STREAMS:-none yet}"
          if [ -z "$STREAMS" ] || [ "$STREAMS" = "None" ]; then
            echo "::warning::No log streams yet — run Core CI first (creates /exam2/sales), then Sales deploy. Check SSM for awslogs errors."
          else
            aws logs get-log-events \
              --log-group-name "${{ env.SALES_LOG_GROUP }}" \
              --log-stream-name "sales-app" \
              --limit 5 \
              --query "events[*].message" \
              --output text 2>/dev/null || echo "(open CloudWatch → Log streams)"
          fi

  verify-in-vpc:
    needs: [terraform, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
      - name: Wait for startup
        run: sleep 20

      - name: Curl Sales & Debug Logs
        run: |
          set -euo pipefail
          INSTANCE_ID="${{ needs.terraform.outputs.ec2_sales_id }}"
          
          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Verify and Debug" \
            --parameters '{"commands":["docker ps", "curl -fsS --max-time 10 http://127.0.0.1/ || (docker logs sales-app && exit 1)"]}' \
            --output text \
            --query "Command.CommandId")
          
          # Wait but don't exit on failure yet so we can fetch logs
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --output json

  trigger-core-update:
    needs: [verify-in-vpc]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Core Workflow
        run: |
          echo "${{ secrets.GH_PAT }}" | gh auth login --with-token
          gh workflow run "Core CI/CD" --repo ${{ env.CORE_REPO }}
